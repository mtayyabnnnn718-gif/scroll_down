<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scroll Progress + Back to Top</title>

<style>
body{
    margin:0;
    height:300vh; /* scroll test */
    font-family:Arial, sans-serif;
    background: radial-gradient(circle at top, #2053cc, #1765eb);
    height: 50px;
}

/* ===================== */
/* TOP PROGRESS BAR */
/* ===================== */
.progress-container{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:5px;
    background: rgba(255,255,255,0.05);
    z-index:999;
}

.progress-bar{
    height:100%;
    width:40%; /* demo fill */
    background: linear-gradient(90deg, #00f5ff, #0066ff, #ff00e0);
    box-shadow:0 0 15px rgba(0,255,255,0.5);
}

/* ===================== */
/* BACK TO TOP BUTTON */
/* ===================== */
.back-top{
    position:fixed;
    bottom:30px;
    right:30px;

    width:65px;
    height:65px;
    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    text-decoration:none;
    color:#fff;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    border:1px solid rgba(255,255,255,0.15);

    box-shadow:0 10px 25px rgba(0,0,0,0.5);
    overflow:hidden;
}

/* Neon ring */
.back-top::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:50%;
    background: conic-gradient(#00f5ff,#0066ff,#ff00e0,#00f5ff);
    filter: blur(8px);
    opacity:0.6;
}

/* Inner layer */
.back-top::after{
    content:"";
    position:absolute;
    inset:4px;
    background:#0b1220;
    border-radius:50%;
}

/* Arrow */
.back-top span{
    position:relative;
    z-index:2;
    font-size:12px;
    font-weight:bold;
    text-align:center;
    line-height:1.2;
}

/* Hover */
.back-top:hover{
    transform:scale(1.1);
}
</style>

</head>

<body>

<!-- Progress Bar -->
<div class="progress-container">
    <div class="progress-bar"></div>
</div>

<!-- Content just for scroll -->
<div style="padding:100px; color:white;">
    <h1>Scroll Down</h1>
    <p>Back to top + progress bar UI demo</p>
</div>

<!-- Back to Top -->
<a href="#" class="back-top" title="Back To Top">
    <span>Top ↑</span>
</a>

</body>
</html>
